[workspace]
members = [
    "shared/utl-helpers",
    "nexo-tools/plugins/epub-extractor",
    "nexo-tools/plugins/game-extractor",
    "shared/nexo-ws-schema",
    "shared/nexo-ws-client",
    "shared/nexo-spec",
    "nexo-gateway",
    "nexo-node",
    "nexo-client",
    "nexo-tools/core/nexo-notes",
    "nexo-tools/nexo-io",
    "nexo-ai",
    "integration-tests",
]

resolver = "3"

# [workspace.lints.rust]
[workspace.lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"

# Optimise candle even in dev/test builds — unoptimised tensor ops are ~10-50x slower.
[profile.dev.package.candle-core]
opt-level = 3
[profile.dev.package.candle-nn]
opt-level = 3
[profile.dev.package.candle-transformers]
opt-level = 3
[profile.dev.package.candle-metal-kernels]
opt-level = 3
[profile.dev.package.metal]
opt-level = 3
[profile.dev.package.half]
opt-level = 3
[profile.dev.package.gemm]
opt-level = 3
[profile.dev.package.gemm-common]
opt-level = 3
[profile.dev.package.gemm-f16]
opt-level = 3

[profile.release]
# https://nnethercote.github.io/perf-book/build-configuration.html
codegen-units = 1
lto = "fat"

# This will enable debug symbols in the release build making it increase in size.
# It will not slow down the actual release. Still for running in containers, it
# would be good if we can disable this when pushing to Container registry.
debug = true
