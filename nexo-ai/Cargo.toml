[package]
name = "nexo-ai"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "nexo-ai"
path = "src/main.rs"
required-features = ["cli"]

[features]
default = ["mlx", "cli"]
mlx = ["dep:reqwest", "dep:base64", "download"]
candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:safetensors",
    "dep:tokenizers",
]
metal = [
    "candle",
    "candle-core/metal",
    "candle-nn/metal",
    "candle-transformers/metal",
]
cli = [
    "dep:clap",
    "dep:rustyline",
    "dep:ctrlc",
    "utl-helpers/interactive",
    "utl-helpers/progress",
    "download",
]
download = [
    "dep:hf-hub",
    "dep:indicatif",
    "dep:console",
    "dep:sha2",
    "dep:rayon",
]

[dependencies]
# Candle inference (optional — behind candle feature)
candle-core = { version = "0", optional = true }
candle-nn = { version = "0", optional = true }
candle-transformers = { version = "0", optional = true }
safetensors = { version = "0", optional = true }
tokenizers = { version = "0", optional = true }
rand = "0.9"
rand_distr = "0.5"

# MLX remote inference (optional — behind mlx feature)
reqwest = { version = "0", default-features = false, features = [
    "json",
    "multipart",
    "rustls-tls",
], optional = true }
base64 = { version = "0.22", optional = true }

# Audio
symphonia = { version = "0", features = [
    "wav",
    "mp3",
    "ogg",
    "flac",
    "pcm",
    "aac",
    "isomp4",
] }
hound = "3"
rubato = "0"
cpal = "0"
rodio = "0"
rustfft = "6"

# Vision
image = "0"
viuer = "0"

# Core
utl-helpers = { path = "../shared/utl-helpers", features = [
    "config",
    "output",
] }
nexo-spec = { path = "../shared/nexo-spec", features = ["tool"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0"
anyhow = "1"
dirs = "6"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process"] }
thiserror = "2"

# CLI-only
clap = { version = "4", features = ["derive"], optional = true }
rustyline = { version = "15", optional = true }
ctrlc = { version = "3", optional = true }

# Download-only
hf-hub = { version = "0.4", default-features = false, features = [
    "tokio",
    "ureq",
    "rustls-tls",
], optional = true }
indicatif = { version = "0", optional = true }
console = { version = "0", optional = true }
sha2 = { version = "0", optional = true }
rayon = { version = "1", optional = true }

[dev-dependencies]
ahash = "0"
toml = "0"
serial_test = "3"
ntest = "0"
tracing-subscriber = { version = "0", features = ["env-filter"] }

[lints]
workspace = true
